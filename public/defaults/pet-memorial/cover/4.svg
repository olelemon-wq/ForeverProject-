<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#2d2d5e"/>
      <stop offset="100%" stop-color="#3d3d6e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#night)"/>
  <!-- Moon -->
  <circle cx="1200" cy="200" r="80" fill="#f0e6c0" opacity="0.7"/>
  <circle cx="1225" cy="185" r="70" fill="#1a1a3e" opacity="0.8"/>
  <!-- Stars -->
  <circle cx="200" cy="100" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="400" cy="180" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="600" cy="80" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="900" cy="120" r="2" fill="#fff" opacity="0.55"/>
  <circle cx="1000" cy="60" r="1.5" fill="#fff" opacity="0.45"/>
  <circle cx="1400" cy="100" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="250" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="700" cy="200" r="1.5" fill="#fff" opacity="0.35"/>
  <circle cx="1100" cy="300" r="1" fill="#fff" opacity="0.3"/>
  <!-- Brightest star (pet star) -->
  <circle cx="500" cy="150" r="4" fill="#fff" opacity="0.9"/>
  <line x1="500" y1="140" x2="500" y2="160" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="490" y1="150" x2="510" y2="150" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <!-- Ground silhouette -->
  <path d="M0 700 Q400 650 800 680 Q1200 710 1600 670 L1600 900 L0 900Z" fill="#151530" opacity="0.8"/>
  <!-- Grass silhouette -->
  <path d="M0 750 Q200 730 400 745 Q600 760 800 740 Q1000 720 1200 745 Q1400 770 1600 735 L1600 900 L0 900Z" fill="#1e1e42" opacity="0.6"/>
  <!-- Small sitting pet silhouette -->
  <g transform="translate(800 640)" opacity="0.6">
    <ellipse cx="0" cy="30" rx="25" ry="20" fill="#1a1a3e"/>
    <circle cx="0" cy="5" r="18" fill="#1a1a3e"/>
    <polygon points="-14,-8 -8,-28 -2,-8" fill="#1a1a3e"/>
    <polygon points="2,-8 8,-28 14,-8" fill="#1a1a3e"/>
  </g>
</svg>
