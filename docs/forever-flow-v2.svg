<svg width="680" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" font-family="'Sarabun','Noto Sans Thai',system-ui,-apple-system,sans-serif" role="img">
  <title>Flow รวมทั้งหมด v2 (เพิ่มขั้นเลือก URL หลังจ่ายเงิน)</title>
  <desc>ผังรวม: ก่อนซื้อ (Home เลือกหัวข้อ, login, กรอกข้อมูลเลือกแผน, ชำระเงิน, gate) เมื่อจ่ายสำเร็จได้ ACTIVE แล้วเลือกและตรวจสอบ URL slug ที่ว่าง จากนั้นตั้งค่าฟีเจอร์ เข้า Dashboard จัดการเนื้อหา ออกแบบการ์ด คัดกรอง ตั้งค่าต่ออายุ เผยแพร่เว็บสาธารณะ และวงจรผู้เยี่ยมชมส่งข้อความรออนุมัติ</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .h { fill:#2C2C2A; font-size:15px; font-weight:600; }
    .band { fill:#5F5E5A; font-size:12px; font-weight:600; }
    .t { fill:#2C2C2A; font-size:12.5px; font-weight:600; }
    .ts { fill:#2C2C2A; font-size:12px; font-weight:600; }
    .s { fill:#5F5E5A; font-size:10.5px; font-weight:400; }
    .ss { fill:#5F5E5A; font-size:10px; font-weight:400; }
    .edge { fill:#5F5E5A; font-size:10px; font-weight:400; }
    .new { fill:#185FA5; font-size:9.5px; font-weight:600; }
    .c-gray   { fill:#F1EFE8; stroke:#5F5E5A; stroke-width:1.2; }
    .c-purple { fill:#EEEDFE; stroke:#534AB7; stroke-width:1.2; }
    .c-teal   { fill:#E1F5EE; stroke:#0F6E56; stroke-width:1.2; }
    .c-amber  { fill:#FAEEDA; stroke:#854F0B; stroke-width:1.2; }
    .c-green  { fill:#EAF3DE; stroke:#3B6D11; stroke-width:1.2; }
    .c-red    { fill:#FCEBEB; stroke:#A32D2D; stroke-width:1.2; }
    .c-blue   { fill:#E6F1FB; stroke:#185FA5; stroke-width:2; }
  </style>

  <rect x="0" y="0" width="680" height="980" fill="#ffffff"/>

  <text class="h" x="340" y="22" text-anchor="middle">flow ทั้งหมด: ก่อนซื้อ → จ่ายเงิน → เลือก URL → หลังเข้าใช้</text>
  <text class="band" x="340" y="45" text-anchor="middle">① ช่วงก่อนซื้อ — จนกว่าจะจ่ายเงิน</text>

  <g fill="none" stroke="#888780" stroke-width="1.5">
    <path d="M340 108 L340 124" marker-end="url(#a)"/>
    <path d="M340 174 L340 190" marker-end="url(#a)"/>
    <path d="M340 240 L340 256" marker-end="url(#a)"/>
    <path d="M340 306 L340 322" marker-end="url(#a)"/>
    <path d="M340 370 L340 392" marker-end="url(#a)"/>
    <path d="M250 346 L192 346" marker-end="url(#a)"/>
    <path d="M105 322 L105 281 L198 281" stroke-dasharray="5 4" marker-end="url(#a)"/>
    <path d="M340 440 L340 456" marker-end="url(#a)"/>
    <path d="M340 512 L340 566" marker-end="url(#a)"/>
  </g>
  <text class="edge" x="220" y="338" text-anchor="end">ยังไม่จ่าย</text>
  <text class="edge" x="150" y="275" text-anchor="middle">กลับไปชำระเงิน</text>
  <text class="edge" x="352" y="386" text-anchor="start">จ่ายสำเร็จ</text>

  <g><rect class="c-gray" x="200" y="58" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="80" text-anchor="middle">1 · หน้า Home — เลือกหัวข้อ</text>
    <text class="s" x="340" y="97" text-anchor="middle">6 ประเภทเว็บไซต์</text></g>
  <g><rect class="c-purple" x="200" y="124" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="146" text-anchor="middle">2 · เข้าสู่ระบบ (บังคับ)</text>
    <text class="s" x="340" y="163" text-anchor="middle">เบอร์+OTP · อีเมล+OTP · Google/Microsoft</text></g>
  <g><rect class="c-purple" x="200" y="190" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="212" text-anchor="middle">3 · กรอกข้อมูล + เลือกแผน</text>
    <text class="s" x="340" y="229" text-anchor="middle">หัวข้อจาก Home ถูกเลือกไว้ให้แล้ว</text></g>
  <g><rect class="c-purple" x="200" y="256" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="278" text-anchor="middle">4 · ชำระเงิน — PromptPay QR</text>
    <text class="s" x="340" y="295" text-anchor="middle">ต้องจ่ายก่อนถึงใช้งานได้</text></g>
  <g><rect class="c-gray" x="250" y="322" width="180" height="48" rx="24"/>
    <text class="t" x="340" y="351" text-anchor="middle">ชำระเงินสำเร็จ?</text></g>
  <g><rect class="c-red" x="20" y="322" width="170" height="48" rx="12"/>
    <text class="ts" x="105" y="343" text-anchor="middle">รอชำระเงิน · ล็อก</text>
    <text class="ss" x="105" y="359" text-anchor="middle">PENDING_PAYMENT</text></g>
  <g><rect class="c-green" x="200" y="392" width="280" height="48" rx="12"/>
    <text class="t" x="340" y="413" text-anchor="middle">ACTIVE + สร้าง Subscription</text>
    <text class="s" x="340" y="429" text-anchor="middle">ปลดล็อกเข้าหลังบ้าน</text></g>

  <g><rect class="c-blue" x="160" y="456" width="360" height="56" rx="13"/>
    <text class="t" x="340" y="478" text-anchor="middle">5 · เลือก &amp; ตรวจสอบ URL (slug) — ขั้นใหม่</text>
    <text class="s" x="340" y="494" text-anchor="middle">forever.co.th/&lt;slug&gt; · เช็คว่าง (a-z, 0-9, -) · คำสงวน</text>
    <text class="new" x="340" y="507" text-anchor="middle">ยืนยันแล้วบันทึกเป็น URL จริงของเว็บ (reuse /api/tenant/validate)</text></g>

  <line x1="20" y1="536" x2="660" y2="536" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="band" x="340" y="556" text-anchor="middle">② ช่วงหลังเข้าใช้ระบบ — จัดการเว็บ</text>

  <g fill="none" stroke="#888780" stroke-width="1.5">
    <path d="M340 614 L340 630" marker-end="url(#a)"/>
    <path d="M340 680 L340 706"/>
    <path d="M90 706 L570 706"/>
    <path d="M90 706 L90 724" marker-end="url(#a)"/>
    <path d="M250 706 L250 724" marker-end="url(#a)"/>
    <path d="M410 706 L410 724" marker-end="url(#a)"/>
    <path d="M570 706 L570 724" marker-end="url(#a)"/>
    <path d="M340 802 L340 828" marker-end="url(#a)"/>
    <path d="M340 876 L340 902" marker-end="url(#a)"/>
  </g>
  <path d="M490 926 L628 926 L628 766 L487 766" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text class="edge" x="352" y="820" text-anchor="start">บันทึก = อัปเดตหน้าเว็บทันที</text>
  <text class="edge" x="624" y="851" text-anchor="end">รออนุมัติ</text>

  <g><rect class="c-gray" x="200" y="568" width="280" height="46" rx="12"/>
    <text class="t" x="340" y="589" text-anchor="middle">ตั้งค่าฟีเจอร์ครั้งแรก · setup-features</text>
    <text class="s" x="340" y="605" text-anchor="middle">เปิด/ปิดเมนูตามหัวข้อ</text></g>
  <g><rect class="c-purple" x="220" y="630" width="240" height="50" rx="12"/>
    <text class="t" x="340" y="652" text-anchor="middle">Dashboard · /manage</text>
    <text class="s" x="340" y="669" text-anchor="middle">ศูนย์กลางจัดการเว็บ</text></g>
  <g><rect class="c-teal" x="15" y="724" width="150" height="78" rx="11"/>
    <text class="ts" x="90" y="748" text-anchor="middle">เนื้อหา</text>
    <text class="ss" x="90" y="766" text-anchor="middle">ภาพ · วิดีโอ</text>
    <text class="ss" x="90" y="782" text-anchor="middle">ผังครอบครัว · e-book</text></g>
  <g><rect class="c-teal" x="175" y="724" width="150" height="78" rx="11"/>
    <text class="ts" x="250" y="748" text-anchor="middle">การ์ด &amp; ธีม</text>
    <text class="ss" x="250" y="766" text-anchor="middle">editor ออกแบบ</text>
    <text class="ss" x="250" y="782" text-anchor="middle">สี · ฟอนต์ · ฮีโร่</text></g>
  <g><rect class="c-amber" x="335" y="724" width="150" height="78" rx="11"/>
    <text class="ts" x="410" y="748" text-anchor="middle">คัดกรอง</text>
    <text class="ss" x="410" y="766" text-anchor="middle">อนุมัติคำไว้อาลัย</text>
    <text class="ss" x="410" y="782" text-anchor="middle">และโพสต์</text></g>
  <g><rect class="c-gray" x="495" y="724" width="150" height="78" rx="11"/>
    <text class="ts" x="570" y="748" text-anchor="middle">ตั้งค่า &amp; บิล</text>
    <text class="ss" x="570" y="766" text-anchor="middle">ฟีเจอร์ · ข้อมูล</text>
    <text class="ss" x="570" y="782" text-anchor="middle">ต่ออายุรายปี</text></g>
  <g><rect class="c-green" x="170" y="828" width="340" height="48" rx="12"/>
    <text class="t" x="340" y="849" text-anchor="middle">เว็บสาธารณะ (เผยแพร่แล้ว)</text>
    <text class="s" x="340" y="866" text-anchor="middle">forever.co.th/&lt;slug&gt;</text></g>
  <g><rect class="c-gray" x="190" y="902" width="300" height="48" rx="12"/>
    <text class="t" x="340" y="923" text-anchor="middle">ผู้เยี่ยมชมเว็บ</text>
    <text class="s" x="340" y="940" text-anchor="middle">ส่งคำไว้อาลัย · โพสต์ · reaction</text></g>

  <g>
    <rect class="c-purple" x="18" y="964" width="11" height="11" rx="3"/><text class="edge" x="34" y="973">login/ศูนย์กลาง</text>
    <rect class="c-blue" x="140" y="964" width="11" height="11" rx="3"/><text class="edge" x="156" y="973">เลือก URL (ใหม่)</text>
    <rect class="c-teal" x="262" y="964" width="11" height="11" rx="3"/><text class="edge" x="278" y="973">จัดการเนื้อหา</text>
    <rect class="c-amber" x="378" y="964" width="11" height="11" rx="3"/><text class="edge" x="394" y="973">คัดกรอง</text>
    <rect class="c-green" x="462" y="964" width="11" height="11" rx="3"/><text class="edge" x="478" y="973">สำเร็จ/เผยแพร่</text>
    <rect class="c-red" x="584" y="964" width="11" height="11" rx="3"/><text class="edge" x="600" y="973">ถูกล็อก</text>
  </g>
</svg>
