<svg width="680" height="900" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" font-family="'Sarabun','Noto Sans Thai',system-ui,-apple-system,sans-serif" role="img">
  <title>Flow รวมทั้งหมดของ ForeverProject</title>
  <desc>ผังรวมสองช่วง: ช่วงก่อนซื้อ (เลือกหัวข้อจากหน้า Home เข้าสู่ระบบ กรอกข้อมูลเลือกแผน ชำระเงิน แล้วผ่าน gate ถ้าไม่จ่ายเว็บถูกล็อก ถ้าจ่ายสำเร็จได้สถานะ ACTIVE) และช่วงหลังเข้าใช้ (ตั้งค่าฟีเจอร์ เข้า Dashboard จัดการเนื้อหา ออกแบบการ์ด คัดกรอง ตั้งค่าและต่ออายุ เผยแพร่เว็บสาธารณะ ผู้เยี่ยมชมส่งข้อความรออนุมัติวนกลับไปคัดกรอง)</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    rect.bg { fill:#ffffff; }
    .h { fill:#2C2C2A; font-size:15px; font-weight:600; }
    .band { fill:#5F5E5A; font-size:12px; font-weight:600; }
    .t { fill:#2C2C2A; font-size:12.5px; font-weight:600; }
    .ts { fill:#2C2C2A; font-size:12px; font-weight:600; }
    .s { fill:#5F5E5A; font-size:10.5px; font-weight:400; }
    .ss { fill:#5F5E5A; font-size:10px; font-weight:400; }
    .edge { fill:#5F5E5A; font-size:10px; font-weight:400; }
    .c-gray   rect, rect.c-gray   { fill:#F1EFE8; stroke:#5F5E5A; stroke-width:1.2; }
    .c-purple rect, rect.c-purple { fill:#EEEDFE; stroke:#534AB7; stroke-width:1.2; }
    .c-teal   rect, rect.c-teal   { fill:#E1F5EE; stroke:#0F6E56; stroke-width:1.2; }
    .c-amber  rect, rect.c-amber  { fill:#FAEEDA; stroke:#854F0B; stroke-width:1.2; }
    .c-green  rect, rect.c-green  { fill:#EAF3DE; stroke:#3B6D11; stroke-width:1.2; }
    .c-red    rect, rect.c-red    { fill:#FCEBEB; stroke:#A32D2D; stroke-width:1.2; }
  </style>

  <rect class="bg" x="0" y="0" width="680" height="900"/>

  <text class="h" x="340" y="22" text-anchor="middle">flow ทั้งหมด: ก่อนซื้อ → จ่ายเงิน → หลังเข้าใช้จัดการเว็บ</text>
  <text class="band" x="340" y="45" text-anchor="middle">① ช่วงก่อนซื้อ — จนกว่าจะจ่ายเงิน</text>

  <g fill="none" stroke="#888780" stroke-width="1.5">
    <path d="M340 108 L340 124" marker-end="url(#a)"/>
    <path d="M340 174 L340 190" marker-end="url(#a)"/>
    <path d="M340 240 L340 256" marker-end="url(#a)"/>
    <path d="M340 306 L340 322" marker-end="url(#a)"/>
    <path d="M340 370 L340 392" marker-end="url(#a)"/>
    <path d="M250 346 L192 346" marker-end="url(#a)"/>
    <path d="M105 322 L105 281 L198 281" stroke-dasharray="5 4" marker-end="url(#a)"/>
  </g>
  <text class="edge" x="220" y="338" text-anchor="end">ยังไม่จ่าย</text>
  <text class="edge" x="150" y="275" text-anchor="middle">กลับไปชำระเงิน</text>
  <text class="edge" x="352" y="386" text-anchor="start">จ่ายสำเร็จ</text>

  <g class="c-gray">
    <rect x="200" y="58" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="80" text-anchor="middle">1 · หน้า Home — เลือกหัวข้อ</text>
    <text class="s" x="340" y="97" text-anchor="middle">6 ประเภทเว็บไซต์</text>
  </g>
  <g class="c-purple">
    <rect x="200" y="124" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="146" text-anchor="middle">2 · เข้าสู่ระบบ (บังคับ)</text>
    <text class="s" x="340" y="163" text-anchor="middle">เบอร์+OTP · อีเมล+OTP · Google/Microsoft</text>
  </g>
  <g class="c-purple">
    <rect x="200" y="190" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="212" text-anchor="middle">3 · กรอกข้อมูล + เลือกแผน</text>
    <text class="s" x="340" y="229" text-anchor="middle">หัวข้อจาก Home ถูกเลือกไว้ให้แล้ว</text>
  </g>
  <g class="c-purple">
    <rect x="200" y="256" width="280" height="50" rx="12"/>
    <text class="t" x="340" y="278" text-anchor="middle">4 · ชำระเงิน — PromptPay QR</text>
    <text class="s" x="340" y="295" text-anchor="middle">ต้องจ่ายก่อนถึงใช้งานได้</text>
  </g>
  <g class="c-gray">
    <rect x="250" y="322" width="180" height="48" rx="24"/>
    <text class="t" x="340" y="351" text-anchor="middle">ชำระเงินสำเร็จ?</text>
  </g>
  <g class="c-red">
    <rect x="20" y="322" width="170" height="48" rx="12"/>
    <text class="ts" x="105" y="343" text-anchor="middle">รอชำระเงิน · ล็อก</text>
    <text class="ss" x="105" y="359" text-anchor="middle">PENDING_PAYMENT</text>
  </g>
  <g class="c-green">
    <rect x="200" y="392" width="280" height="48" rx="12"/>
    <text class="t" x="340" y="413" text-anchor="middle">ACTIVE + สร้าง Subscription</text>
    <text class="s" x="340" y="429" text-anchor="middle">ปลดล็อกเข้าหลังบ้าน</text>
  </g>

  <line x1="20" y1="460" x2="660" y2="460" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="band" x="340" y="480" text-anchor="middle">② ช่วงหลังเข้าใช้ระบบ — จัดการเว็บ</text>

  <g fill="none" stroke="#888780" stroke-width="1.5">
    <path d="M340 440 L340 492" marker-end="url(#a)"/>
    <path d="M340 538 L340 554" marker-end="url(#a)"/>
    <path d="M340 604 L340 630"/>
    <path d="M90 630 L570 630"/>
    <path d="M90 630 L90 648" marker-end="url(#a)"/>
    <path d="M250 630 L250 648" marker-end="url(#a)"/>
    <path d="M410 630 L410 648" marker-end="url(#a)"/>
    <path d="M570 630 L570 648" marker-end="url(#a)"/>
    <path d="M340 726 L340 752" marker-end="url(#a)"/>
    <path d="M340 800 L340 822" marker-end="url(#a)"/>
  </g>
  <path d="M490 849 L628 849 L628 690 L487 690" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text class="edge" x="352" y="744" text-anchor="start">บันทึก = อัปเดตหน้าเว็บทันที</text>
  <text class="edge" x="624" y="775" text-anchor="end">รออนุมัติ</text>

  <g class="c-gray">
    <rect x="200" y="492" width="280" height="46" rx="12"/>
    <text class="t" x="340" y="513" text-anchor="middle">ตั้งค่าฟีเจอร์ครั้งแรก · setup-features</text>
    <text class="s" x="340" y="529" text-anchor="middle">เปิด/ปิดเมนูตามหัวข้อ</text>
  </g>
  <g class="c-purple">
    <rect x="220" y="554" width="240" height="50" rx="12"/>
    <text class="t" x="340" y="576" text-anchor="middle">Dashboard · /manage</text>
    <text class="s" x="340" y="593" text-anchor="middle">ศูนย์กลางจัดการเว็บ</text>
  </g>
  <g class="c-teal">
    <rect x="15" y="648" width="150" height="78" rx="11"/>
    <text class="ts" x="90" y="672" text-anchor="middle">เนื้อหา</text>
    <text class="ss" x="90" y="690" text-anchor="middle">ภาพ · วิดีโอ</text>
    <text class="ss" x="90" y="706" text-anchor="middle">ผังครอบครัว · e-book</text>
  </g>
  <g class="c-teal">
    <rect x="175" y="648" width="150" height="78" rx="11"/>
    <text class="ts" x="250" y="672" text-anchor="middle">การ์ด &amp; ธีม</text>
    <text class="ss" x="250" y="690" text-anchor="middle">editor ออกแบบ</text>
    <text class="ss" x="250" y="706" text-anchor="middle">สี · ฟอนต์ · ฮีโร่</text>
  </g>
  <g class="c-amber">
    <rect x="335" y="648" width="150" height="78" rx="11"/>
    <text class="ts" x="410" y="672" text-anchor="middle">คัดกรอง</text>
    <text class="ss" x="410" y="690" text-anchor="middle">อนุมัติคำไว้อาลัย</text>
    <text class="ss" x="410" y="706" text-anchor="middle">และโพสต์</text>
  </g>
  <g class="c-gray">
    <rect x="495" y="648" width="150" height="78" rx="11"/>
    <text class="ts" x="570" y="672" text-anchor="middle">ตั้งค่า &amp; บิล</text>
    <text class="ss" x="570" y="690" text-anchor="middle">ฟีเจอร์ · ข้อมูล</text>
    <text class="ss" x="570" y="706" text-anchor="middle">ต่ออายุรายปี</text>
  </g>
  <g class="c-green">
    <rect x="170" y="752" width="340" height="48" rx="12"/>
    <text class="t" x="340" y="773" text-anchor="middle">เว็บสาธารณะ (เผยแพร่แล้ว)</text>
    <text class="s" x="340" y="790" text-anchor="middle">forever.co.th/&lt;slug&gt;</text>
  </g>
  <g class="c-gray">
    <rect x="190" y="822" width="300" height="48" rx="12"/>
    <text class="t" x="340" y="843" text-anchor="middle">ผู้เยี่ยมชมเว็บ</text>
    <text class="s" x="340" y="860" text-anchor="middle">ส่งคำไว้อาลัย · โพสต์ · reaction</text>
  </g>

  <g>
    <rect class="c-purple" x="40" y="884" width="11" height="11" rx="3"/>
    <text class="edge" x="56" y="893">login/ศูนย์กลาง</text>
    <rect class="c-teal" x="168" y="884" width="11" height="11" rx="3"/>
    <text class="edge" x="184" y="893">จัดการเนื้อหา</text>
    <rect class="c-amber" x="290" y="884" width="11" height="11" rx="3"/>
    <text class="edge" x="306" y="893">คัดกรอง</text>
    <rect class="c-green" x="384" y="884" width="11" height="11" rx="3"/>
    <text class="edge" x="400" y="893">สำเร็จ/เผยแพร่</text>
    <rect class="c-red" x="516" y="884" width="11" height="11" rx="3"/>
    <text class="edge" x="532" y="893">ถูกล็อก</text>
  </g>
</svg>
